# Power savings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Mouse/pointing support (required for mouse keycodes in keymap)
CONFIG_ZMK_POINTING=y

# Bluetooth power optimization
CONFIG_BT=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Disable unused features
# CONFIG_LOG=y

# Keyboard scan debounce (lower = faster response)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Reduce flash wear by debouncing settings saves
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=5000
